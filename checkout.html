<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - ShreeJi Notes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="checkout-container">
        <!-- Left Column: Checkout Form -->
        <div class="checkout-form-section">
            <h2>Checkout</h2>
            
            <form>
                <h3>Customer Details</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name *</label>
                        <input type="text" placeholder="Sarah" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name *</label>
                        <input type="text" placeholder="Davis" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" placeholder="mail@shreejinotes.com" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number *</label>
                        <input type="text" placeholder="+91 00000 00000" required>
                    </div>
                </div>

                <h3>Shipping Details</h3>
                <div class="form-group">
                    <label>Street Address *</label>
                    <input type="text" placeholder="Alpha Plus, Main Road" required>
                </div>

                <h3>Payment Method</h3>
                <div class="payment-methods">
                    <label><input type="radio" name="payment" checked> Credit / Debit Card</label>
                    <label><input type="radio" name="payment"> PayPal</label>
                </div>

                <div class="form-group" style="margin-top: 15px;">
                    <label>Card Number *</label>
                    <input type="text" placeholder="xxxx xxxx xxxx 4568" required>
                </div>
                
                <button type="submit" class="checkout-submit-btn">Complete Purchase & Download</button>
            </form>
        </div>

        <!-- Right Column: Order Summary -->
        <div class="order-summary-section">
            <h3>Order Summary</h3>
            <div class="summary-item">
                <div>
                    <h4>DSA Premium Notes</h4>
                    <p>Qty: 1</p>
                </div>
                <span>$24.99</span>
            </div>
            
            <hr>
            <div class="summary-row">
                <span>Subtotal</span>
                <span>$24.99</span>
            </div>
            <div class="summary-row">
                <span>Taxes</span>
                <span>$2.00</span>
            </div>
            <div class="summary-row highlight">
                <span>Total</span>
                <span>$26.99</span>
            </div>
        </div>
    </div>

</body>
</html>
